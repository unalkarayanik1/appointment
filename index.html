<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandevuNet | Modern Sağlık Sistemi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="#" class="logo">Randevu<span>Net</span></a>
            <div class="nav-links">
                <button onclick="showAppts()" class="btn-secondary">Randevularım</button>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1>Sağlığınız için en iyi doktoru bulun.</h1>
            <div class="search-card">
                <div class="search-grid">
                    <select id="citySelect" onchange="updateDistricts()">
                        <option value="">Şehir Seçin</option>
                    </select>
                    <select id="specSelect">
                        <option value="">Uzmanlık Alanı</option>
                    </select>
                    <button onclick="handleSearch()" class="btn-primary">Doktor Bul</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="resultsTitle" class="results-header">Popüler Doktorlar</div>
        <div id="doctorGrid" class="doctor-grid">
            </div>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
